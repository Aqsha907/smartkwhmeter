<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KWH Monitoring Kos Khaliq</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      display:flex;
      background:#0f172a;
      color:white;
      min-height:100vh;
      overflow:hidden;
    }

    /* ================= SIDEBAR ================= */

    .sidebar{
      width:260px;
      background:#082f6b;
      transition:0.3s;
      display:flex;
      flex-direction:column;
      padding:15px;
    }

    .sidebar.minimized{
      width:85px;
    }

    .top-sidebar{
      display:flex;
      align-items:center;
      margin-bottom:20px;
    }

    .toggle-btn{
      width:40px;
      height:40px;
      border:none;
      border-radius:12px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      font-size:18px;
      transition:0.3s;
    }

    .toggle-btn:hover{
      background:#3b82f6;
    }

    .sidebar-header{
      padding-bottom:20px;
      border-bottom:1px solid rgba(255,255,255,0.1);
      text-align:left;
    }

    .sidebar-header h1{
      font-size:22px;
      line-height:1.4;
    }

    .sidebar-header p{
      margin-top:5px;
      color:#cbd5e1;
      font-size:14px;
    }

    .menu{
      margin-top:20px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .menu button{
      background:transparent;
      border:none;
      color:white;
      padding:15px;
      border-radius:14px;
      cursor:pointer;
      transition:0.3s;
      display:flex;
      align-items:center;
      gap:15px;
      font-size:16px;
    }

    .menu button:hover{
      background:#1d4ed8;
    }

    .menu button.active{
      background:#2563eb;
    }

    .icon{
      font-size:22px;
      min-width:25px;
      text-align:center;
    }

    .menu-text{
      white-space:nowrap;
    }

    /* MINIMIZE */

    .sidebar.minimized .sidebar-header{
      display:none;
    }

    .sidebar.minimized .menu-text{
      display:none;
    }

    .sidebar.minimized .menu button{
      justify-content:center;
      padding:15px 10px;
    }

    .sidebar.minimized .icon{
      margin:0;
      font-size:24px;
    }

    /* ================= CONTENT ================= */

    .content{
      flex:1;
      padding:25px;
      overflow-y:auto;
    }

    .page-title{
      font-size:32px;
      margin-bottom:25px;
    }

    .dashboard{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#1e293b;
      border-radius:20px;
      padding:25px;
      border:1px solid #334155;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card h2{
      font-size:18px;
      color:#cbd5e1;
      margin-bottom:15px;
    }

    .value{
      font-size:42px;
      font-weight:bold;
      color:#38bdf8;
    }

    .unit{
      margin-top:10px;
      color:#94a3b8;
    }

    /* ================= CHART ================= */

    .chart-container{
      background:#1e293b;
      padding:20px;
      border-radius:20px;
      border:1px solid #334155;
    }

    .chart-title{
      font-size:24px;
      margin-bottom:20px;
    }

    canvas{
      width:100% !important;
      height:450px !important;
    }

    /* ================= STATS ================= */

    .stats-container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .stats-card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:18px;
      padding:20px;
    }

    .stats-card h3{
      color:#94a3b8;
      font-size:16px;
      margin-bottom:10px;
    }

    .stats-value{
      font-size:32px;
      font-weight:bold;
      color:#38bdf8;
    }

    .hidden{
      display:none;
    }

  </style>
</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar" id="sidebar">

    <!-- TOGGLE -->

    <div class="top-sidebar">

      <button class="toggle-btn" onclick="toggleSidebar()">
        ☰
      </button>

    </div>

    <!-- HEADER -->

    <div class="sidebar-header">
      <h1>KWH Monitoring Kos Khaliq</h1>
      <p>Kamar No. 1</p>
    </div>

    <!-- MENU -->

    <div class="menu">

      <button class="active" onclick="showPage('dashboard', this)">

        <span class="icon">🏠</span>

        <span class="menu-text">
          Dashboard
        </span>

      </button>

      <button onclick="showPage('voltage', this)">

        <span class="icon">⚡</span>

        <span class="menu-text">
          Tegangan
        </span>

      </button>

      <button onclick="showPage('current', this)">

        <span class="icon">🔌</span>

        <span class="menu-text">
          Arus
        </span>

      </button>

      <button onclick="showPage('power', this)">

        <span class="icon">💡</span>

        <span class="menu-text">
          Daya
        </span>

      </button>

    </div>

  </div>

  <!-- CONTENT -->

  <div class="content">

    <!-- DASHBOARD -->

    <div id="dashboardPage">

      <h1 class="page-title">
        Dashboard
      </h1>

      <div class="dashboard">

        <div class="card">
          <h2>Tegangan</h2>
          <div class="value" id="voltage">0</div>
          <div class="unit">Volt</div>
        </div>

        <div class="card">
          <h2>Arus</h2>
          <div class="value" id="current">0</div>
          <div class="unit">Ampere</div>
        </div>

        <div class="card">
          <h2>Daya</h2>
          <div class="value" id="power">0</div>
          <div class="unit">Watt</div>
        </div>

        <div class="card">
          <h2>Prakiraan Tagihan</h2>
          <div class="value" id="bill">0</div>
          <div class="unit">Rupiah</div>
        </div>

      </div>

    </div>

    <!-- DETAIL PAGE -->

    <div id="detailPage" class="hidden">

      <div class="chart-container">

        <div class="chart-title" id="chartTitle">
          Grafik
        </div>

        <!-- STATS -->

        <div class="stats-container">

          <div class="stats-card">

            <h3>Terendah</h3>

            <div class="stats-value" id="minValue">
              0
            </div>

          </div>

          <div class="stats-card">

            <h3>Saat Ini</h3>

            <div class="stats-value" id="currentValue">
              0
            </div>

          </div>

          <div class="stats-card">

            <h3>Tertinggi</h3>

            <div class="stats-value" id="maxValue">
              0
            </div>

          </div>

        </div>

        <!-- CHART -->

        <canvas id="myChart"></canvas>

      </div>

    </div>

  </div>

<script>

const SUPABASE_URL =
"https://rfuqlynoyxshgbppomqz.supabase.co";

const SUPABASE_KEY =
"sb_publishable_UGVgMNfm8j4Bf8N5l3tkEA_0Px95vLa";

/* Tarif listrik */
const ELECTRICITY_PRICE = 1444.7;

let allData = [];
let chart;

async function loadData(){

  const response = await fetch(
    `${SUPABASE_URL}/rest/v1/monitoring_listrik?select=*&order=created_at.desc&limit=30`,
    {
      headers:{
        apikey: SUPABASE_KEY,
        Authorization:`Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await response.json();

  allData = data.reverse();

  if(data.length > 0){

    const latest = data[data.length - 1];

    /* VALUE DASHBOARD */

    document.getElementById("voltage").innerHTML =
      parseFloat(latest.voltage).toFixed(1);

    document.getElementById("current").innerHTML =
      parseFloat(latest.current).toFixed(2);

    document.getElementById("power").innerHTML =
      parseFloat(latest.power).toFixed(1);

    /* PRAKIRAAN TAGIHAN */

    let totalKwh = 0;

    allData.forEach(item => {

      totalKwh +=
        parseFloat(item.power) / 1000;

    });

    const estimatedBill =
      totalKwh * ELECTRICITY_PRICE;

    document.getElementById("bill").innerHTML =
      "Rp " + estimatedBill.toFixed(0);

  }
}

function showPage(type, element){

  /* ACTIVE MENU */

  document.querySelectorAll(".menu button")
    .forEach(btn => btn.classList.remove("active"));

  element.classList.add("active");

  /* DASHBOARD */

  if(type === "dashboard"){

    document.getElementById("dashboardPage")
      .classList.remove("hidden");

    document.getElementById("detailPage")
      .classList.add("hidden");

    return;
  }

  /* DETAIL PAGE */

  document.getElementById("dashboardPage")
    .classList.add("hidden");

  document.getElementById("detailPage")
    .classList.remove("hidden");

  updateChart(type);
}

function updateChart(type){

  const labels = allData.map(item =>
    new Date(item.created_at)
    .toLocaleTimeString()
  );

  const values = allData.map(item =>
    parseFloat(item[type])
  );

  /* HITUNG MIN MAX CURRENT */

  const min =
    Math.min(...values);

  const max =
    Math.max(...values);

  const current =
    values[values.length - 1];

  /* UNIT */

  let unit = "";

  if(type === "voltage"){
    unit = " V";
  }

  if(type === "current"){
    unit = " A";
  }

  if(type === "power"){
    unit = " W";
  }

  /* TAMPILKAN STATS */

  document.getElementById("minValue")
    .innerHTML =
    min.toFixed(1) + unit;

  document.getElementById("currentValue")
    .innerHTML =
    current.toFixed(1) + unit;

  document.getElementById("maxValue")
    .innerHTML =
    max.toFixed(1) + unit;

  /* TITLE */

  let title = "";
  let color = "";

  if(type === "voltage"){
    title = "Grafik Tegangan";
    color = "#38bdf8";
  }

  if(type === "current"){
    title = "Grafik Arus";
    color = "#22c55e";
  }

  if(type === "power"){
    title = "Grafik Daya";
    color = "#facc15";
  }

  document.getElementById("chartTitle")
    .innerHTML = title;

  /* DESTROY CHART */

  if(chart){
    chart.destroy();
  }

  const ctx =
    document.getElementById("myChart");

  chart = new Chart(ctx, {

    type:'line',

    data:{

      labels:labels,

      datasets:[{

        label:title,
        data:values,
        borderColor:color,
        backgroundColor:color,
        tension:0.3,
        fill:false

      }]
    },

    options:{

      responsive:true,

      plugins:{
        legend:{
          labels:{
            color:'white'
          }
        }
      },

      scales:{

        x:{
          ticks:{
            color:'white'
          },
          grid:{
            color:'#334155'
          }
        },

        y:{
          ticks:{
            color:'white'
          },
          grid:{
            color:'#334155'
          }
        }
      }
    }
  });
}

function toggleSidebar(){

  document.getElementById("sidebar")
    .classList.toggle("minimized");
}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
