<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KWH Monitoring Kos Khaliq</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      padding:20px;
    }

    .header{
      text-align:center;
      margin-bottom:30px;
    }

    .header h1{
      font-size:36px;
      margin-bottom:10px;
      color:#ffffff;
    }

    .header p{
      color:#aaaaaa;
      font-size:18px;
    }

    .dashboard{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:#1b1b1b;
      border-radius:20px;
      padding:25px;
      text-align:center;
      cursor:pointer;
      transition:0.3s;
      border:1px solid #2c2c2c;
    }

    .card:hover{
      transform:translateY(-5px);
      background:#252525;
    }

    .card h2{
      font-size:18px;
      color:#bbbbbb;
      margin-bottom:15px;
    }

    .value{
      font-size:42px;
      font-weight:bold;
      color:#00bfff;
    }

    .unit{
      color:#888;
      margin-top:8px;
    }

    .chart-container{
      background:#1b1b1b;
      border-radius:20px;
      padding:20px;
      border:1px solid #2c2c2c;
    }

    .chart-title{
      margin-bottom:20px;
      font-size:22px;
      color:white;
    }

    canvas{
      width:100% !important;
      height:400px !important;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>KWH Monitoring Kos Khaliq</h1>
    <p>Kamar No. 1</p>
  </div>

  <div class="dashboard">

    <div class="card" onclick="showChart('voltage')">
      <h2>Tegangan</h2>
      <div class="value" id="voltage">0</div>
      <div class="unit">Volt</div>
    </div>

    <div class="card" onclick="showChart('current')">
      <h2>Arus</h2>
      <div class="value" id="current">0</div>
      <div class="unit">Ampere</div>
    </div>

    <div class="card" onclick="showChart('power')">
      <h2>Daya</h2>
      <div class="value" id="power">0</div>
      <div class="unit">Watt</div>
    </div>

  </div>

  <div class="chart-container">
    <div class="chart-title" id="chartTitle">
      Grafik Daya
    </div>

    <canvas id="myChart"></canvas>
  </div>

<script>

const SUPABASE_URL =
"https://rfuqlynoyxshgbppomqz.supabase.co";

const SUPABASE_KEY =
"sb_publishable_UGVgMNfm8j4Bf8N5l3tkEA_0Px95vLa";

let allData = [];
let chart;
let currentType = "power";

async function loadData(){

  const response = await fetch(
    `${SUPABASE_URL}/rest/v1/monitoring_listrik?select=*&order=created_at.desc&limit=30`,
    {
      headers:{
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await response.json();

  allData = data.reverse();

  if(data.length > 0){

    const latest = data[0];

    document.getElementById("voltage").innerHTML =
      parseFloat(latest.voltage).toFixed(1);

    document.getElementById("current").innerHTML =
      parseFloat(latest.current).toFixed(2);

    document.getElementById("power").innerHTML =
      parseFloat(latest.power).toFixed(1);

    updateChart(currentType);
  }
}

function showChart(type){

  currentType = type;

  updateChart(type);
}

function updateChart(type){

  const labels = allData.map(item =>
    new Date(item.created_at).toLocaleTimeString()
  );

  const values = allData.map(item => item[type]);

  let title = "";
  let color = "";

  if(type === "voltage"){
    title = "Grafik Tegangan";
    color = "#00bfff";
  }

  if(type === "current"){
    title = "Grafik Arus";
    color = "#00ff99";
  }

  if(type === "power"){
    title = "Grafik Daya";
    color = "#ffcc00";
  }

  document.getElementById("chartTitle").innerHTML =
    title;

  if(chart){
    chart.destroy();
  }

  const ctx =
    document.getElementById("myChart");

  chart = new Chart(ctx, {

    type:'line',

    data:{
      labels:labels,

      datasets:[{
        label:title,
        data:values,
        borderColor:color,
        backgroundColor:color,
        tension:0.3
      }]
    },

    options:{

      responsive:true,

      plugins:{
        legend:{
          labels:{
            color:'white'
          }
        }
      },

      scales:{

        x:{
          ticks:{
            color:'white'
          },
          grid:{
            color:'#333'
          }
        },

        y:{
          ticks:{
            color:'white'
          },
          grid:{
            color:'#333'
          }
        }
      }
    }
  });
}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
